%[site;title=Klassen verwalten;content=!FOLLOWS]
<section id="classes">
    <header>
        <h1>Klassen verwalten</h1>
    </header>
    <main>
        <section id="addClass">
            <h2>Klasse hinzufügen</h2>
            <form id="addClassForm" method="post" action="/add-class">
                <label for="className">Name der Klasse:</label>
                <input type="text" id="className" name="className" required>
                <label for="grade">Stufe:</label>
                <input type="number" id="grade" name="grade" required>
                <button type="submit">Hinzufügen</button>
            </form>
        </section>
        <section id="classList">
            <h2>Klassenübersicht</h2>
            <table id="classTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Stufe</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <!-- class rows will be inserted here -->
                </tbody>
            </table>
        </section>
    </main>
    <nav>
        %[admin_nav]
    </nav>
</section>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        loadClasses();
    });

    async function loadClasses() {
        populateTable("/classes", "classTable", (newRow, cls) => {
            newRow.innerHTML = `
                <td>${cls.id}</td>
                <td>${cls.label}</td>
                <td>${cls.grade}</td>
                <td><button class="edit" onclick='viewClass(${JSON.stringify(cls)})'>Bearbeiten</button></td>
            `;
        });
    }
</script>
